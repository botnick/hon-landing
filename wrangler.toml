# hon-landing — MERGED Cloudflare Pages app (public landing + admin CMS).
#
# ONE worker serves both: the public landing (reads content) and the admin CMS
# (writes it). They share ONE D1 (CMS_DB) + ONE KV (CMS_KV).
#
# LOCAL DEV: `pnpm dev` (astro) wires these bindings via astro.config platformProxy,
# using the SAME .wrangler/state dir that `wrangler d1 execute --local` writes to.
# The ids below are local placeholders — only consulted for --remote operations.
# See README "Deploy" for creating real D1/KV and wiring their ids.
#
# SECRETS (never commit): SESSION_SECRET, CF_API_TOKEN, TRANSLATE_API_KEY — set with
#   wrangler pages secret put SESSION_SECRET   (etc.)

name = "hon-landing"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Version-history + RBAC + settings store (admin writes, landing needs it present).
[[d1_databases]]
binding = "CMS_DB"
database_name = "hon-x-cms"
database_id = "local-placeholder-replace-on-deploy"

# Live content snapshot: admin WRITES site:live, landing READS it. Same namespace.
[[kv_namespaces]]
binding = "CMS_KV"
id = "local-placeholder-replace-on-deploy"

[vars]
COOKIE_SECURE = "true"
